<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI分析仪</title>

<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

<style>
body{background:#000;color:#0f0;font-family:Arial;padding:20px}
.box{background:#111;padding:10px;margin:10px}
.chart{height:300px}
</style>

</head>

<body>

<h2>📊 AI分析仪（不会404版本）</h2>

<div class="box" id="list">加载中...</div>

<div class="box chart" id="pie"></div>

<script>

// ⚠️ 这里自动读取当前仓库（不会写死路径 → 防404关键）
const url = "./data.txt";

fetch(url)
.then(r=>r.text())
.then(t=>{

document.getElementById("list").innerHTML = t;

// 简单模拟图表
let wx={木:10,火:20,土:30,金:15,水:25};

echarts.init(document.getElementById("pie")).setOption({
series:[{
type:"pie",
data:[
{name:"木",value:wx木},
{name:"火",value:wx火},
{name:"土",value:wx土},
{name:"金",value:wx金},
{name:"水",value:wx水}
]
}]
});

});

</script>

</body>
</html>
