<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>AI3.0 六合彩分析仪</title>

<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

<style>
body{background:#000;color:#0f0;font-family:Arial}
.box{padding:10px;margin:10px;background:#111}
.chart{height:300px}
</style>

</head>

<body>

<h2>📊 AI3.0 六合彩分析仪</h2>

<div class="box" id="list"></div>

<div class="box chart" id="pie"></div>

<script>

const url="https://raw.githubusercontent.com/YOUR_USER/YOUR_REPO/main/mark6_ai.txt";

fetch(url).then(r=>r.text()).then(t=>{

let lines=t.trim().split("\n");

document.getElementById("list").innerHTML=lines.join("<br>");

let wx={木:0,火:0,土:0,金:0,水:0};

lines.forEach(l=>{

let nums=l.split(" ")[0].split(" ");

nums.forEach(n=>{

n=parseInt(n);

if([3,8,13,18,23,28,33,38,43,48].includes(n)) wx木++;
else if([2,7,12,17,22,27,32,37,42,47].includes(n)) wx火++;
else if([5,10,15,20,25,30,35,40,45].includes(n)) wx土++;
else if([4,9,14,19,24,29,34,39,44,49].includes(n)) wx金++;
else wx水++;

});

});


echarts.init(document.getElementById("pie")).setOption({

series:[{
type:"pie",
data:[
{name:"木",value:wx木},
{name:"火",value:wx火},
{name:"土",value:wx土},
{name:"金",value:wx金},
{name:"水",value:wx水}
]
}]

});

});

</script>

</body>

</html>
