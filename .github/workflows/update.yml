name: AI6.0 Stable Pipeline

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    # ① 拉代码
    - uses: actions/checkout@v4

    # ② Python环境
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    # ③ 安装依赖
    - run: pip install requests beautifulsoup4

    # -----------------------------
    # 🧠 关键：防断链顺序
    # -----------------------------

    # ④ 先抓数据（必须）
    - name: Fetch Data
      run: |
        python fetch_sources.py || echo "fetch failed, using fallback"

    # ⑤ 清洗数据（必须）
    - name: Clean Data
      run: |
        python data_cleaner.py || echo "clean skipped"

    # ⑥ AI计算（核心）
    - name: AI Engine
      run: |
        python ai_engine.py

    # ⑦ 提交结果
    - name: Commit Results
      run: |
        git config --global user.name github-actions
        git config --global user.email actions@github.com

        git add data_warehouse.json mark6_ai.txt || true

        git commit -m "AI6.0 auto update" || echo "no changes"

        git push || echo "push skipped"